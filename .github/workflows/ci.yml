---
name: CI
on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/ci.yml
      - shard.yml
      - shard.lock
      - Dockerfile
      - "**/*.cr"
      - github-action/**
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crystal: [latest, "1.19.0", "1.20.0"]
    steps:
      - uses: actions/checkout@v6
      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: ${{ matrix.crystal }}
      - name: Install dependencies
        run: shards install
      - name: Install xmllint (for XSD schema-validation specs)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libxml2-utils
      - name: Check formatting
        run: crystal tool format --check
      - name: Build
        run: shards build
      - name: Run tests
        run: crystal spec
      - name: GitHub Action entrypoint output-injection test (issue #70)
        if: matrix.crystal == 'latest'
        run: ./github-action/test-entrypoint.sh
  build-docker:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [linux/amd64, linux/arm64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v4
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
      - name: Build Docker image
        id: build-and-push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: ${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
